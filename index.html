<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveABC 練題中心 - 模擬考與歷程分析</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header: Controls and Branding -->
        <!-- Header: Controls and Branding -->
        <header class="header glass-panel">
            <div class="logo-area">
                <div class="logo-text">
                    <span class="logo-icon">📚</span>
                    <h1>LiveABC</h1>
                </div>
            </div>

            <div class="header-main-group desktop-only">
                <div class="controls">
                    <select id="test-selector" class="glass-select">
                        <option value="1">第一回 (Test 1)</option>
                        <option value="2">第二回 (Test 2)</option>
                        <option value="3">第三回 (Test 3)</option>
                        <option value="4">第四回 (Test 4)</option>
                    </select>
                </div>
            </div>

            <div class="header-right-group">
                <div class="timer-panel glass-panel desktop-only">
                    <div class="audio-mini-ctrl">
                        <button id="audio-play-btn" class="icon-btn-plain">▶️</button>
                        <audio id="audio-player">
                            <source id="audio-source" src="" type="audio/mpeg">
                        </audio>
                    </div>
                    <span class="timer-display">⏳ <span id="timer-text">120:00</span></span>
                    <button id="timer-toggle-btn">開始</button>
                </div>
                
                <div class="mobile-timer-display mobile-only">
                    <button id="audio-play-btn-mobile" class="icon-btn-plain" style="margin-right: 8px;">▶️</button>
                    <span id="timer-text-mobile">⏳ 120:00</span>
                </div>

                <div class="desktop-only action-group">
                    <div class="toggle-group">
                        <input type="checkbox" id="pdf-toggle">
                        <label for="pdf-toggle" class="toggle-label" data-off="題目模式" data-on="解析對答案"></label>
                    </div>
                    <button id="vocabulary-btn" class="secondary-btn">📓 學習中心</button>
                    <button id="grade-btn" class="primary-btn">自動批改</button>
                </div>

                <button id="menu-btn" class="icon-btn mobile-only">☰</button>
            </div>
        </header>

        <div id="side-menu" class="side-menu drawer-right">
            <div class="side-menu-header">
                <h3>功能與導航</h3>
                <button id="close-menu" class="icon-btn">✕</button>
            </div>
            <div class="side-menu-body">
                <div class="drawer-section">
                    <h4>測驗狀態</h4>
                    <div class="drawer-timer">
                        <span id="timer-drawer-text">⏳ 120:00</span>
                        <button id="timer-toggle-btn-mobile" class="primary-btn">開始測驗</button>
                    </div>
                    <button id="grade-btn-mobile" class="primary-btn wide-btn urgent-btn">🏁 結束交卷</button>
                </div>
                
                <div class="drawer-section">
                    <h4>跳題索引</h4>
                    <div id="jump-index-grid" class="jump-index-grid">
                        <!-- 70 buttons generated by JS -->
                    </div>
                </div>

                <div class="drawer-section">
                    <h4>其他功能</h4>
                    <div class="menu-item-toggle">
                        <label>解析模式</label>
                        <div class="toggle-group">
                            <input type="checkbox" id="pdf-toggle-mobile">
                            <label for="pdf-toggle-mobile" class="toggle-label" data-off="關閉" data-on="開啟"></label>
                        </div>
                    </div>
                    <button id="vocabulary-btn-mobile" class="secondary-btn wide-btn">📓 學習中心</button>
                    <div class="menu-item">
                        <label>更換題庫</label>
                        <select id="test-selector-mobile" class="glass-select mobile-select"></select>
                    </div>
                </div>
            </div>
        </div>

        <div class="score-display" id="score-display" style="display:none;">
            <div class="score-main">
                <span class="score-label">總分</span>
                <span class="score-text"><strong id="score-value">0</strong> / 70</span>
            </div>
            <div class="score-details">
                <span class="s-listening">🎧 聽力: <span id="score-listening">0</span>/35</span>
                <span class="s-reading">📖 閱讀: <span id="score-reading">0</span>/35</span>
            </div>
        </div>

        <!-- Main Content: PDF View and Answer Sheet -->
        <main class="main-content">
            <div class="pdf-panel glass-panel">
                <div class="pdf-panel-header">
                    <span>📄 試題文件</span>
                    <div class="zoom-controls">
                        <button id="zoom-out-btn" class="zoom-tool-btn" title="縮小">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                        </button>
                        <button id="zoom-in-btn" class="zoom-tool-btn" title="放大">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                        </button>
                    </div>
                </div>
                <div class="pdf-viewport">
                    <iframe id="pdf-viewer" title="PDF Viewer" src="about:blank" frameborder="0"></iframe>
                </div>
            </div>

            <div class="tools-panel">
                <div class="answer-sheet-container glass-panel">
                    <div class="panel-header">
                        <span class="icon">✏️</span>
                        <h3>互動答案卡</h3>
                    </div>
                    <div id="answer-sheet" class="answer-sheet">
                        <!-- Questions 1-70 populated by JS -->
                    </div>
                    
                    <!-- Mobile Navigation Footer -->
                    <div id="mobile-nav-foot" class="mobile-nav-foot mobile-only">
                        <button id="prev-q-btn" class="nav-arrow">⬅️</button>
                        <div class="current-q-info">
                            第 <span id="current-q-num">1</span> 題
                        </div>
                        <button id="next-q-btn" class="nav-arrow">➡️</button>
                        <button id="grade-btn-mobile-footer" class="mobile-submit-btn">提交</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Learning Hub Modal -->
    <div id="learning-hub-modal" class="modal-overlay">
        <div class="modal-content hub-content glass-panel">
            <div class="hub-header">
                <div class="hub-tabs">
                    <button class="hub-tab-btn active" data-tab="history">📊 成績紀錄</button>
                    <button class="hub-tab-btn" data-tab="vocab">📓 單字庫</button>
                    <button class="hub-tab-btn" data-tab="notes">📝 學習筆記</button>
                </div>
                <button id="close-hub" class="icon-btn">✕</button>
            </div>
            
            <div class="hub-body">
                <!-- Tab: History -->
                <div id="tab-history" class="hub-tab-pane active">
                    <div class="pane-header">
                        <h3>練習歷程統計</h3>
                        <button id="clear-history" class="text-btn">清除紀錄</button>
                    </div>
                    <div id="history-list" class="history-list">
                        <div class="empty-msg">尚無練習記錄，開始練習吧！</div>
                    </div>
                </div>

                <!-- Tab: Vocab -->
                <div id="tab-vocab" class="hub-tab-pane">
                    <div class="search-box">
                        <input type="text" id="vocab-input" placeholder="輸入單字查詢 Yahoo 字典..." class="glass-input">
                        <div class="search-actions">
                            <button id="dict-search-btn" class="secondary-btn">🔍 字典查詢</button>
                            <button id="add-vocab-btn" class="primary-btn">➕ 記錄單字</button>
                        </div>
                    </div>
                    <div class="notes-section">
                        <h4>我的生字本</h4>
                        <div id="notes-list" class="notes-list"></div>
                    </div>
                </div>

                <!-- Tab: Notes -->
                <div id="tab-notes" class="hub-tab-pane">
                    <div class="search-box">
                        <input type="text" id="note-input" placeholder="輸入學習重點、語法筆記..." class="glass-input">
                        <button id="add-note-btn" class="primary-btn">➕ 新增筆記</button>
                    </div>
                    <div class="notes-section">
                        <h4>筆記清單</h4>
                        <div id="general-notes-list" class="notes-list">
                            <div class="empty-msg">尚無筆記</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
